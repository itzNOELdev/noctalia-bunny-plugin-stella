# Bunny — a cute bunny that lives in your bar.
#
# Idles by default, naps when you left-click it (left-click again to wake
# it back up), and hops with a right-click — the hop always lands back in
# whichever mood (idle/sleep) was active before it fired.

id = "stella/bunny"
name = "Bunny"
version = "3.1.0"
min_noctalia = "5.0.0"
author = "stella"
license = "GPL-3.0"
dependencies = []
icon = "paw"
description = "A cute bunny that idles, naps, and hops — left click to toggle sleep, right click to jump."
tags = ["fun", "animation"]

[[widget]]
id = "bunny"
entry = "bunny.luau"

  [[widget.setting]]
  key = "image_height"
  type = "int"
  label_key = "settings.image_height.label"
  description_key = "settings.image_height.description"
  default = 32
  min = 14
  max = 128

  [[widget.setting]]
  key = "playback_speed"
  type = "double"
  label_key = "settings.playback_speed.label"
  description_key = "settings.playback_speed.description"
  default = 1.0
  min = 0.25
  max = 3.0
  advanced = true
