# Bunny — a cute bunny that lives in your bar and cycles through moods.
#
# Each mood (eating, playing, sleeping, ...) is a small looping GIF-based
# animation. The bunny loops whatever mood is current forever; click it to
# move to the next one. New moods can be added by dropping a GIF in
# assets/source_gifs/ and running tools/build_states.py — no code changes,
# no new settings, no rebuild of this file needed. See README.md.

id = "stella/bunny"
name = "Bunny"
version = "3.0.0"
min_noctalia = "5.0.0"
author = "stella"
license = "GPL-3.0"
dependencies = []
icon = "paw"
description = "A cute bunny that loops through moods (eating, playing, sleeping, ...) — click to cycle."
tags = ["fun", "animation"]

[[widget]]
id = "bunny"
entry = "bunny.luau"

  [[widget.setting]]
  key = "image_height"
  type = "int"
  label_key = "settings.image_height.label"
  description_key = "settings.image_height.description"
  default = 32
  min = 14
  max = 128

  [[widget.setting]]
  key = "playback_speed"
  type = "double"
  label_key = "settings.playback_speed.label"
  description_key = "settings.playback_speed.description"
  default = 1.0
  min = 0.25
  max = 3.0
  advanced = true
